server:
  port: 8080

spring:
  application:
    name: api-gateway-quickbite

  cloud:
    gateway:
      server:
        webmvc:
          routes:

            # AUTH SERVICE
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**

            # USER SERVICE
            - id: user-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/users/**

            # MENU SERVICE
            - id: menu-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/menu/**

management:
  endpoints:
    web:
      exposure:
        include: health,info